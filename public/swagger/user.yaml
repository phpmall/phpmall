openapi: 3.0.0
info:
  title: API文档
  description: 买家平台接口
  contact:
    name: 'API Develop Team'
  version: '1.0'
servers:
  -
    url: 'http://127.0.0.1:8000/user'
    description: 开发环境
  -
    url: 'https://demo.phpmall.net/user'
    description: 测试环境
paths:
  /address:
    get:
      tags:
        - 收货地址
      summary: 获取用户全部收货地址
      operationId: bae5779d5c4e089d8558d47a2c892e03
      parameters:
        -
          name: page
          in: query
          description: 当前页码
          required: true
          example: 1
        -
          name: pageSize
          in: query
          description: 每页分页数
          required: false
          example: 10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: App\Gateways\User\Requests\Address\AddressQueryRequest
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: App\Gateways\User\Responses\AddressResponse
      security:
        -
          bearerAuth: []
    put:
      tags:
        - 收货地址
      summary: 更新用户收货地址
      operationId: e1078a9bf0f8c1ea8604190820afd920
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: App\Gateways\User\Requests\Address\AddressUpdateRequest
      responses:
        '200':
          description: OK
      security:
        -
          bearerAuth: []
    post:
      tags:
        - 收货地址
      summary: 新增用户收货地址
      operationId: 0777cf7484de11622e770fed19ddc6d2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: App\Gateways\User\Requests\Address\AddressCreateRequest
      responses:
        '200':
          description: OK
      security:
        -
          bearerAuth: []
    delete:
      tags:
        - 收货地址
      summary: 删除用户收货地址
      operationId: 628e3702b083f80ce70536b0720bfd71
      parameters:
        -
          name: id
          in: query
          description: 收货地址ID
          required: true
          example: 1
      responses:
        '200':
          description: OK
      security:
        -
          bearerAuth: []
  /address/show:
    get:
      tags:
        - 收货地址
      summary: 查询用户收货地址
      operationId: 356a360b548561e70e7d923558e44eb6
      parameters:
        -
          name: id
          in: query
          description: 收货地址ID
          required: true
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: App\Gateways\User\Responses\AddressResponse
      security:
        -
          bearerAuth: []
  /:
    get:
      tags:
        - 用户首页
      summary: 用户概要信息
      operationId: ddb07c99afca9ac5843e0f47807c9fbd
      responses:
        '200':
          description: OK
  /profile:
    get:
      tags:
        - 用户资料
      summary: 获取用户详细信息
      operationId: 73865f9c46335597fe34ea9064eb8bdb
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      name: Authorization
      bearerFormat: JWT
      scheme: bearer
