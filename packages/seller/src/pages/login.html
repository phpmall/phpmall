<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    {:token_meta()}
    <title>管理平台登录</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="{:asset('static/layui/css/layui.css')}" rel="stylesheet">
    <script src="{:asset('static/layui/layui.js')}"></script>
    <style>
        html, body {
            background: #fafafa;
        }

        .login-wrap {
            margin: 220px auto 0;
            width: 340px;
            border: 1px solid #e2e2e2;
            padding: 20px;
            background: white;
        }

        .login-container {
            width: 320px;
            margin: 21px auto 0;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <form class="layui-form">
        <div class="login-container">
            <div class="layui-form-item">
                <div class="layui-input-wrap">
                    <div class="layui-input-prefix">
                        <i class="layui-icon layui-icon-username"></i>
                    </div>
                    <input type="text" name="username" value="" lay-verify="required" placeholder="用户名"
                           lay-reqtext="请填写用户名" autocomplete="off" class="layui-input" lay-affix="clear">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-wrap">
                    <div class="layui-input-prefix">
                        <i class="layui-icon layui-icon-password"></i>
                    </div>
                    <input type="password" name="password" value="" lay-verify="required" placeholder="密   码"
                           lay-reqtext="请填写密码" autocomplete="off" class="layui-input" lay-affix="eye">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-row">
                    <div class="layui-col-xs7">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-vercode"></i>
                            </div>
                            <input type="text" name="captcha" value="" lay-verify="required" placeholder="验证码"
                                   lay-reqtext="请填写验证码" autocomplete="off" class="layui-input" lay-affix="clear">
                        </div>
                    </div>
                    <div class="layui-col-xs5">
                        <div style="margin-left: 10px;">
                            <img id="captchaImage" alt="图片验证码" src="" style="display: none;"/>
                            <input type="hidden" name="captchaId" value="" id="captchaId"/>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <input type="checkbox" name="remember" lay-skin="primary" title="记住密码">
                <a href="{:url('/admin/forget')}" style="float: right; margin-top: 7px;">忘记密码？</a>
            </div>
            <div class="layui-form-item">
                <button class="layui-btn layui-btn-fluid" lay-submit lay-filter="login">登录</button>
            </div>
        </div>
    </form>
</div>
<script>
    layui.use(function () {
        var form = layui.form,
            layer = layui.layer,
            $ = layui.jquery;

        // 定义图片验证码
        var loadCaptcha = function () {
            $.get('/api/common/captcha/image?v=' + Math.random(), function (res) {
                if (res.code === 0) {
                    $('#captchaId').val(res.data.captchaId);
                    $('#captchaImage').attr('src', res.data.captchaImage).show();
                }
            })
        }

        // 加载验证码和点击事件
        loadCaptcha();
        $('#captchaImage').bind('click', function () {
            loadCaptcha();
        })

        // 提交事件
        form.on('submit(login)', function (data) {
            var field = data.field; // 获取表单字段值
            // 此处可执行 Ajax 等操作
            $.post('/api/admin/login', JSON.stringify(field), function (res) {
                if (res.code === 0) {
                    console.log(res.data)
                } else {
                    layer.msg(res.message, {icon: 0});
                    loadCaptcha();
                }
            })
            return false; // 阻止默认 form 跳转
        });
    });
</script>
</body>
</html>
